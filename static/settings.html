<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLC 설정 - RSpring Viewer</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0a0a0f;
            color: #e0e0e0;
            min-height: 100vh;
            line-height: 1.6;
        }
        
        /* Header */
        .header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border-bottom: 1px solid #2a2a4a;
            padding: 0 24px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .header-title {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .header-title h1 {
            font-size: 18px;
            font-weight: 600;
            color: #00d4ff;
            letter-spacing: 0.5px;
        }
        
        .header-title .badge {
            background: rgba(0, 212, 255, 0.15);
            color: #00d4ff;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 500;
        }
        
        .btn-back {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: transparent;
            border: 1px solid #2a2a4a;
            border-radius: 6px;
            color: #aaa;
            font-size: 13px;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
        }
        
        .btn-back:hover {
            background: #1a2a4a;
            border-color: #00d4ff;
            color: #00d4ff;
        }
        
        /* Main Container */
        .main-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
        }
        
        /* Cards */
        .card {
            background: #111122;
            border: 1px solid #2a2a4a;
            border-radius: 12px;
            margin-bottom: 20px;
            overflow: hidden;
        }
        
        .card-header {
            background: linear-gradient(135deg, #1a1a2e 0%, #1a2040 100%);
            padding: 16px 20px;
            border-bottom: 1px solid #2a2a4a;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .card-header h2 {
            font-size: 14px;
            font-weight: 600;
            color: #00d4ff;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .card-header .icon {
            font-size: 18px;
        }
        
        .card-body {
            padding: 20px;
        }
        
        /* Equipment Selector */
        .equipment-selector {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        
        .equipment-selector select {
            flex: 1;
        }
        
        /* Form Elements */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        
        .form-group label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #888;
        }
        
        .form-group input,
        .form-group select {
            background: #0d0d1a;
            border: 1px solid #2a2a4a;
            border-radius: 6px;
            padding: 10px 14px;
            color: #e0e0e0;
            font-size: 14px;
            font-family: 'JetBrains Mono', monospace;
            transition: all 0.2s;
        }
        
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #00d4ff;
            box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.1);
        }
        
        .form-group input::placeholder {
            color: #555;
        }
        
        /* Status Badge */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }
        
        .status-badge .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }
        
        .status-connected {
            background: rgba(0, 255, 136, 0.1);
            color: #00ff88;
        }
        
        .status-connected .dot {
            background: #00ff88;
            box-shadow: 0 0 8px #00ff88;
        }
        
        .status-disconnected {
            background: rgba(255, 68, 68, 0.1);
            color: #ff4444;
        }
        
        .status-disconnected .dot {
            background: #ff4444;
        }
        
        /* Mapping Table */
        .mapping-table-container {
            overflow-x: auto;
            margin-top: 16px;
        }
        
        .mapping-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        
        .mapping-table th {
            background: #1a1a2e;
            padding: 12px 14px;
            text-align: left;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #888;
            border-bottom: 1px solid #2a2a4a;
        }
        
        .mapping-table td {
            padding: 10px 14px;
            border-bottom: 1px solid #1a1a2e;
        }
        
        .mapping-table tr:hover {
            background: rgba(0, 212, 255, 0.03);
        }
        
        .mapping-table input,
        .mapping-table select {
            width: 100%;
            background: #0d0d1a;
            border: 1px solid #2a2a4a;
            border-radius: 4px;
            padding: 8px 10px;
            color: #e0e0e0;
            font-size: 13px;
            font-family: 'JetBrains Mono', monospace;
        }
        
        .mapping-table input:focus,
        .mapping-table select:focus {
            outline: none;
            border-color: #00d4ff;
        }
        
        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px 18px;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #00d4ff 0%, #00a8cc 100%);
            color: #000;
        }
        
        .btn-primary:hover {
            box-shadow: 0 4px 20px rgba(0, 212, 255, 0.3);
            transform: translateY(-1px);
        }
        
        .btn-secondary {
            background: #1a2a4a;
            color: #00d4ff;
            border: 1px solid #2a4a6a;
        }
        
        .btn-secondary:hover {
            background: #2a3a5a;
        }
        
        .btn-danger {
            background: rgba(255, 68, 68, 0.15);
            color: #ff6b6b;
            border: 1px solid rgba(255, 68, 68, 0.3);
        }
        
        .btn-danger:hover {
            background: rgba(255, 68, 68, 0.25);
        }
        
        .btn-sm {
            padding: 6px 12px;
            font-size: 12px;
        }
        
        .btn-group {
            display: flex;
            gap: 12px;
            margin-top: 24px;
            flex-wrap: wrap;
        }
        
        /* Description */
        .card-description {
            color: #666;
            font-size: 13px;
            margin-bottom: 16px;
        }
        
        /* Toast */
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            padding: 14px 24px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.3s;
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }
        
        .toast.success {
            background: linear-gradient(135deg, #1a3a2a 0%, #1a4a3a 100%);
            border: 1px solid #00ff88;
            color: #00ff88;
        }
        
        .toast.error {
            background: linear-gradient(135deg, #3a1a1a 0%, #4a1a1a 100%);
            border: 1px solid #ff4444;
            color: #ff6b6b;
        }
        
        /* Add mapping button */
        .add-mapping-btn {
            margin-top: 16px;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .main-container {
                padding: 16px;
            }
            
            .form-grid {
                grid-template-columns: 1fr;
            }
            
            .equipment-selector {
                flex-direction: column;
            }
            
            .btn-group {
                flex-direction: column;
            }
            
            .btn-group .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-title">
            <h1>⚙️ PLC 설정</h1>
            <span class="badge">Melsec MC Protocol</span>
        </div>
        <a href="/" class="btn-back">← 뷰어로 돌아가기</a>
    </header>

    <main class="main-container">
        <!-- 장비 선택 -->
        <div class="card">
            <div class="card-header">
                <span class="icon">📋</span>
                <h2>장비 선택</h2>
            </div>
            <div class="card-body">
                <div class="equipment-selector">
                    <select id="equipmentSelect">
                        <option value="">-- 장비를 선택하세요 --</option>
                    </select>
                    <button class="btn btn-secondary" onclick="loadEquipmentConfig()">불러오기</button>
                    <button class="btn btn-primary" onclick="createNewConfig()">+ 새 장비</button>
                </div>
            </div>
        </div>

        <!-- PLC 연결 설정 -->
        <div class="card">
            <div class="card-header">
                <span class="icon">🔌</span>
                <h2>PLC 연결 설정</h2>
            </div>
            <div class="card-body">
                <div class="form-grid">
                    <div class="form-group">
                        <label>장비 ID</label>
                        <input type="text" id="equipmentId" placeholder="예: CNC001">
                    </div>
                    <div class="form-group">
                        <label>PLC IP 주소</label>
                        <input type="text" id="plcIp" placeholder="192.168.1.100">
                    </div>
                    <div class="form-group">
                        <label>포트</label>
                        <input type="number" id="plcPort" value="4999">
                    </div>
                    <div class="form-group">
                        <label>폴링 주기 (ms)</label>
                        <input type="number" id="pollInterval" value="1000">
                    </div>
                    <div class="form-group">
                        <label>네트워크 번호</label>
                        <input type="number" id="network" value="0">
                    </div>
                    <div class="form-group">
                        <label>PC 번호</label>
                        <input type="number" id="pcNumber" value="255">
                    </div>
                    <div class="form-group">
                        <label>AAS 서버 URL</label>
                        <input type="text" id="aasServer" value="http://localhost:8080">
                    </div>
                    <div class="form-group">
                        <label>연결 상태</label>
                        <div id="connectionStatus" class="status-badge status-disconnected">
                            <span class="dot"></span>
                            미연결
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 메모리 매핑 -->
        <div class="card">
            <div class="card-header">
                <span class="icon">📍</span>
                <h2>메모리 주소 매핑</h2>
            </div>
            <div class="card-body">
                <p class="card-description">PLC 메모리 주소를 AAS Submodel 속성에 매핑합니다. 지원 디바이스: D, W, R, M, X, Y, B</p>
                
                <div class="mapping-table-container">
                    <table class="mapping-table" id="mappingTable">
                        <thead>
                            <tr>
                                <th style="width:14%">디바이스</th>
                                <th style="width:12%">데이터 타입</th>
                                <th style="width:20%">AAS Submodel</th>
                                <th style="width:20%">AAS Property</th>
                                <th style="width:12%">스케일</th>
                                <th style="width:12%">오프셋</th>
                                <th style="width:10%">액션</th>
                            </tr>
                        </thead>
                        <tbody id="mappingBody">
                        </tbody>
                    </table>
                </div>
                
                <button class="btn btn-secondary add-mapping-btn" onclick="addMappingRow()">+ 매핑 추가</button>
            </div>
        </div>

        <!-- 액션 버튼 -->
        <div class="btn-group">
            <button class="btn btn-primary" onclick="saveConfig()">💾 설정 저장</button>
            <button class="btn btn-secondary" onclick="testConnection()">🔍 연결 테스트</button>
            <button class="btn btn-secondary" onclick="exportConfig()">📤 TOML 내보내기</button>
        </div>
    </main>

    <div id="toast" class="toast"></div>

    <script src="/js/plc-settings.js"></script>
</body>
</html>
