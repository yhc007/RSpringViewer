<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLC 설정 - RSpring Viewer</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .settings-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .settings-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .settings-header h1 {
            margin: 0;
            color: #333;
        }
        .card {
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            padding: 20px;
            margin-bottom: 20px;
        }
        .card h2 {
            margin-top: 0;
            color: #444;
            border-bottom: 2px solid #4CAF50;
            padding-bottom: 10px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }
        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }
        .mapping-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        .mapping-table th, .mapping-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        .mapping-table th {
            background: #f5f5f5;
            font-weight: bold;
        }
        .mapping-table tr:hover {
            background: #f9f9f9;
        }
        .mapping-table input, .mapping-table select {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
        }
        .btn-primary {
            background: #4CAF50;
            color: white;
        }
        .btn-primary:hover {
            background: #45a049;
        }
        .btn-secondary {
            background: #2196F3;
            color: white;
        }
        .btn-secondary:hover {
            background: #1976D2;
        }
        .btn-danger {
            background: #f44336;
            color: white;
        }
        .btn-danger:hover {
            background: #d32f2f;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        .status-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 12px;
        }
        .status-connected {
            background: #e8f5e9;
            color: #2e7d32;
        }
        .status-disconnected {
            background: #ffebee;
            color: #c62828;
        }
        .equipment-select {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 20px;
        }
        .equipment-select select {
            flex: 1;
            padding: 10px;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 4px;
            color: white;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 1000;
        }
        .toast.show {
            opacity: 1;
        }
        .toast.success {
            background: #4CAF50;
        }
        .toast.error {
            background: #f44336;
        }
    </style>
</head>
<body>
    <div class="settings-container">
        <div class="settings-header">
            <h1>🔧 PLC → AAS 설정</h1>
            <a href="/" class="btn btn-secondary">← 뷰어로 돌아가기</a>
        </div>

        <!-- 장비 선택 -->
        <div class="card">
            <h2>📋 장비 선택</h2>
            <div class="equipment-select">
                <select id="equipmentSelect">
                    <option value="">-- 장비를 선택하세요 --</option>
                </select>
                <button class="btn btn-secondary" onclick="loadEquipmentConfig()">불러오기</button>
                <button class="btn btn-primary" onclick="createNewConfig()">+ 새 장비</button>
            </div>
        </div>

        <!-- PLC 연결 설정 -->
        <div class="card">
            <h2>🔌 PLC 연결 설정</h2>
            <div class="form-row">
                <div class="form-group">
                    <label>장비 ID</label>
                    <input type="text" id="equipmentId" placeholder="예: CNC001">
                </div>
                <div class="form-group">
                    <label>PLC IP 주소</label>
                    <input type="text" id="plcIp" placeholder="예: 192.168.1.100">
                </div>
                <div class="form-group">
                    <label>포트</label>
                    <input type="number" id="plcPort" value="4999">
                </div>
                <div class="form-group">
                    <label>폴링 주기 (ms)</label>
                    <input type="number" id="pollInterval" value="1000">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>네트워크 번호</label>
                    <input type="number" id="network" value="0">
                </div>
                <div class="form-group">
                    <label>PC 번호</label>
                    <input type="number" id="pcNumber" value="255">
                </div>
                <div class="form-group">
                    <label>AAS 서버 URL</label>
                    <input type="text" id="aasServer" value="http://localhost:8080">
                </div>
                <div class="form-group">
                    <label>상태</label>
                    <span id="connectionStatus" class="status-badge status-disconnected">미연결</span>
                </div>
            </div>
        </div>

        <!-- 메모리 매핑 -->
        <div class="card">
            <h2>📍 메모리 주소 매핑</h2>
            <p>PLC 메모리 주소를 AAS 속성에 매핑합니다.</p>
            <table class="mapping-table" id="mappingTable">
                <thead>
                    <tr>
                        <th style="width:15%">디바이스</th>
                        <th style="width:10%">타입</th>
                        <th style="width:20%">AAS Submodel</th>
                        <th style="width:20%">AAS Property</th>
                        <th style="width:10%">스케일</th>
                        <th style="width:10%">오프셋</th>
                        <th style="width:15%">액션</th>
                    </tr>
                </thead>
                <tbody id="mappingBody">
                    <!-- 동적으로 채워짐 -->
                </tbody>
            </table>
            <button class="btn btn-secondary" onclick="addMappingRow()" style="margin-top: 15px">+ 매핑 추가</button>
        </div>

        <!-- 저장/테스트 버튼 -->
        <div class="btn-group">
            <button class="btn btn-primary" onclick="saveConfig()">💾 설정 저장</button>
            <button class="btn btn-secondary" onclick="testConnection()">🔍 연결 테스트</button>
            <button class="btn btn-secondary" onclick="exportConfig()">📤 TOML 내보내기</button>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script src="/js/plc-settings.js"></script>
</body>
</html>
